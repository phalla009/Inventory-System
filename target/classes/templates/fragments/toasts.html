<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:fragment="toast-styles">
	<style>
@keyframes slideInLeft {from { transform:translateX(-110%);
	opacity: 0;
}

to {
	transform: translateX(0);
	opacity: 1;
}

}
@keyframes slideOutLeft {from { transform:translateX(0);
	opacity: 1;
}

to {
	transform: translateX(-110%);
	opacity: 0;
}

}
.toast-slide-left {
	animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.toast-slide-left.hiding {
	animation: slideOutLeft 0.3s ease-in forwards;
}

.toast-container-custom {
	position: fixed;
	bottom: 1.5rem;
	left: 1.5rem;
	z-index: 1090;
	display: flex;
	flex-direction: column;
	gap: 10px;
}
</style>
</th:block>
</head>

<body>

	<!-- ═══════════════════════════════════════════
       FRAGMENT: toast-container
       Usage: <div th:replace="~{fragments/toasts :: toast-container}"></div>
  ════════════════════════════════════════════ -->
	<div th:fragment="toast-container">

		<div class="toast-container-custom">

			<!-- Error Toast -->
			<div th:if="${errorMessage}"
				class="toast toast-slide-left align-items-center border show"
				role="alert" aria-live="assertive" aria-atomic="true"
				data-bs-delay="3000"
				style="background-color: #ffffff; border-color: #f0f0f0 !important; border-radius: 10px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); min-width: 320px;">
				<div class="d-flex align-items-center px-3 py-2" style="gap: 12px;">
					<span
						style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background-color: #fff0f0; flex-shrink: 0;">
						<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
							fill="#e53e3e" viewBox="0 0 16 16">
              <path
								d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4zm0 7.5a.875.875 0 1 1 0-1.75.875.875 0 0 1 0 1.75z" />
            </svg>
					</span>
					<div class="toast-body p-0 flex-grow-1" th:text="${errorMessage}"
						style="font-size: 0.875rem; color: #2d2d2d; font-weight: 500; line-height: 1.4;">
						Error message will appear here</div>
					<button type="button" class="btn-close" data-bs-dismiss="toast"
						aria-label="Close"
						style="opacity: 0.35; flex-shrink: 0; margin: 0;"></button>
				</div>
			</div>

			<!-- Success Toast -->
			<div th:if="${successMessage}"
				class="toast toast-slide-left align-items-center border show"
				role="alert" aria-live="assertive" aria-atomic="true"
				data-bs-delay="3000"
				style="background-color: #f8fff9; border-color: #c6f0d0 !important; border-radius: 10px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); min-width: 320px;">
				<div class="d-flex align-items-center px-3 py-2" style="gap: 12px;">
					<span
						style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background-color: #e6f9ec; flex-shrink: 0;">
						<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
							fill="#38a169" viewBox="0 0 16 16">
              <path
								d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z" />
            </svg>
					</span>
					<div class="toast-body p-0 flex-grow-1" th:text="${successMessage}"
						style="font-size: 0.875rem; color: #2d2d2d; font-weight: 500; line-height: 1.4;">
						Success message will appear here</div>
					<button type="button" class="btn-close" data-bs-dismiss="toast"
						aria-label="Close"
						style="opacity: 0.35; flex-shrink: 0; margin: 0;"></button>
				</div>
			</div>

		</div>

	</div>

	<!-- ═══════════════════════════════════════════
       FRAGMENT: toast-scripts
       Usage: <div th:replace="~{fragments/toasts :: toast-scripts}"></div>
  ════════════════════════════════════════════ -->
	<th:block th:fragment="toast-scripts">
		<script>
			document.addEventListener('DOMContentLoaded', function() {
				document.querySelectorAll('.toast-slide-left').forEach(
						function(toastEl) {
							// Init Bootstrap toast
							const bsToast = new bootstrap.Toast(toastEl);
							bsToast.show();

							// Slide-out animation on hide
							toastEl.addEventListener('hide.bs.toast',
									function() {
										toastEl.classList.add('hiding');
									});
						});
			});
		</script>
	</th:block>

</body>
</html>
