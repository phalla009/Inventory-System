<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Products-Listing</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
	rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link
	href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer&display=swap"
	rel="stylesheet">
<link class="icon" type="image/png" href="/images/kr.png">

</head>
<body>
	<div class="d-flex">
		<div th:replace="fragments/sidebar :: sidebar"></div>

		<div class="content p-4">
			<h1 class="mb-3">
				<i class="bi bi-box-seam me-2"></i> Products Listing
			</h1>

			<div class="position-fixed top-0 end-0 p-3" style="z-index: 1055;">
				<div th:replace="~{fragments/toasts :: toast-container}"></div>
			</div>

			<form id="bulkDeleteForm" th:action="@{/products/delete-multiple}"
				method="post">

				<div class="mb-3 d-flex gap-2">
					<button type="button" class="btn btn-primary"
						data-bs-toggle="modal" data-bs-target="#addProductModal">
						<i class="bi bi-plus-circle me-1"></i> Add Product
					</button>

					<button type="button" id="btnBulkDelete"
						class="btn btn-danger d-none" data-bs-toggle="modal"
						data-bs-target="#bulkDeleteModal">
						<i class="bi bi-trash me-1"></i> Delete Selected (<span
							id="selectCount">0</span>)
					</button>
				</div>

				<div class="mb-3 d-flex gap-2" style="width: 70%;">
					<div class="input-group">
						<span class="input-group-text" id="search-icon"> <i
							class="bi bi-search"></i>
						</span> <input type="text" id="searchInput" class="form-control"
							placeholder="Search products by product name, category..."
							aria-label="Search" aria-describedby="search-icon">
					</div>
					<select id="categoryFilter" class="form-select"
						style="max-width: 200px;">
						<option value="">All Categories</option>
						<th:block th:each="product : ${products}">
							<option th:if="${product.category != null}"
								th:value="${product.category.name}"
								th:text="${product.category.name}"></option>
						</th:block>
					</select>
				</div>

				<div style="max-height: 450px; overflow-y: auto;">
					<table class="table table-bordered table-hover align-middle">
						<thead class="table-dark"
							style="position: sticky; top: 0; z-index: 2;">
							<tr>
								<th style="width: 40px;" class="text-center"><input
									type="checkbox" id="selectAll" class="form-check-input">
								</th>
								<th>ID</th>
								<th>Product Name</th>
								<th>Quantity</th>
								<th>Price</th>
								<th>Category</th>
								<th>Supplier</th>
								<th>Status</th>
								<th>Created At</th>
								<th>Actions</th>
							</tr>
						</thead>
						<tbody style="font-family: 'Noto Sans Khmer', Arial, sans-serif;">
							<tr th:each="product, iterStat : ${products}">
								<td class="text-center"><input type="checkbox"
									name="productIds" th:value="${product.id}"
									class="form-check-input row-checkbox"></td>
								<td th:text="${iterStat.count}"></td>
								<td th:text="${product.name}"></td>
								<td th:text="${product.quantity}"></td>
								<td th:text="${product.price} + ' $'"></td>
								<td
									th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
								<td
									th:text="${product.supplier != null ? product.supplier.name : 'N/A'}"></td>
								<td><span th:if="${product.status == 'Active'}"> <i
										class="bi bi-check-circle text-success"></i>
								</span> <span th:if="${product.status == 'Inactive'}"> <i
										class="bi bi-x-circle text-danger"></i>
								</span> <span th:text="${product.status}" class="ms-1"></span></td>
								<td
									th:text="${product.create_at != null ? #temporals.format(product.create_at, 'yyyy-MM-dd HH:mm') : 'N/A'}"></td>
								<td>
									<button type="button" class="btn btn-warning btn-sm"
										data-bs-toggle="modal" data-bs-target="#editProductModal"
										th:attr="data-id=${product.id}">
										<i class="bi bi-pencil-square"></i>
									</button>
									<button type="button" class="btn btn-danger btn-sm"
										data-bs-toggle="modal" data-bs-target="#deleteModal"
										th:attr="data-id=${product.id}, data-name=${product.name}">
										<i class="bi bi-trash"></i>
									</button>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(products)}">
								<td colspan="10" class="text-center">No products found.</td>
							</tr>
						</tbody>
					</table>
				</div>
			</form>
		</div>
	</div>

	<div class="modal fade" id="addProductModal" tabindex="-1"
		aria-labelledby="addProductModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content">
				<div
					class="modal-header bg-primary text-white justify-content-center position-relative">
					<h5 class="modal-title text-center" id="addProductModalLabel">
						<i class="bi bi-plus-circle"></i> Add New Product
					</h5>
				</div>
				<div class="modal-body" id="addProductForm">
					<div class="text-center py-4">
						<div class="spinner-border text-primary"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="editProductModal" tabindex="-1"
		aria-labelledby="editProductModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content">
				<div
					class="modal-header text-dark justify-content-center position-relative"
					style="background-color: #ffc107;">
					<h5 class="modal-title text-center" id="editProductModalLabel">
						<i class="bi bi-pencil-square"></i> Edit Product
					</h5>
				</div>
				<div class="modal-body" id="editProductForm">
					<div class="text-center py-4">
						<div class="spinner-border text-primary"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="deleteModal" tabindex="-1"
		aria-labelledby="deleteModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header bg-danger text-white">
					<h5 class="modal-title" id="deleteModalLabel">
						<i class="bi bi-exclamation-triangle"></i> Confirm Delete
					</h5>
					<button type="button" class="btn-close btn-close-white"
						data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<p>Are you sure you want to delete this product?</p>
					<p>
						<strong id="deleteProductName"></strong>
					</p>
				</div>
				<div class="modal-footer">
					<form id="deleteForm" th:action="@{'/products/delete/'}"
						method="post" class="w-100">
						<input type="hidden" name="_method" value="delete">
						<div class="row g-2">
							<div class="col">
								<button type="button" class="btn btn-secondary w-100"
									data-bs-dismiss="modal">
									<i class="bi bi-x-circle me-1"></i> No, keep it
								</button>
							</div>
							<div class="col">
								<button type="submit" class="btn btn-danger w-100">
									<i class="bi bi-trash me-1"></i> Yes, Delete!
								</button>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="bulkDeleteModal" tabindex="-1"
		aria-labelledby="bulkDeleteModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">
				<div class="modal-header bg-danger text-white">
					<h5 class="modal-title" id="bulkDeleteModalLabel">
						<i class="bi bi-exclamation-triangle"></i> Confirm Bulk Delete
					</h5>
					<button type="button" class="btn-close btn-close-white"
						data-bs-dismiss="modal" aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<p>Are you sure you want to delete all selected products?</p>
				</div>
				<div class="modal-footer">
					<div class="row g-2 w-100">
						<div class="col">
							<button type="button" class="btn btn-secondary w-100"
								data-bs-dismiss="modal">
								<i class="bi bi-x-circle me-1"></i> Cancel
							</button>
						</div>
						<div class="col">
							<button type="button" id="confirmBulkDeleteBtn"
								class="btn btn-danger w-100">
								<i class="bi bi-trash me-1"></i> Yes, Delete Selected!
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
	document.addEventListener('DOMContentLoaded', function() {
		const selectAll = document.getElementById('selectAll');
		const rowCheckboxes = document.querySelectorAll('.row-checkbox');
		const btnBulkDelete = document.getElementById('btnBulkDelete');
		const selectCount = document.getElementById('selectCount');
		const bulkDeleteForm = document.getElementById('bulkDeleteForm');
		const confirmBulkDeleteBtn = document.getElementById('confirmBulkDeleteBtn');

		function updateBulkDeleteButton() {
			// Find checked checkboxes that are currently visible (not filtered out)
			const checkedCount = Array.from(rowCheckboxes).filter(cb => cb.checked && cb.closest('tr').style.display !== 'none').length;
			
			if (checkedCount > 0) {
				btnBulkDelete.classList.remove('d-none');
				selectCount.textContent = checkedCount;
			} else {
				btnBulkDelete.classList.add('d-none');
			}
		}

		// Select/Deselect All Checkboxes
		selectAll.addEventListener('change', function() {
			rowCheckboxes.forEach(cb => {
				// Only select checkboxes that are visible
				if (cb.closest('tr').style.display !== 'none') {
					cb.checked = selectAll.checked;
				}
			});
			updateBulkDeleteButton();
		});

		// Event listener for individual row checkboxes
		rowCheckboxes.forEach(cb => {
			cb.addEventListener('change', updateBulkDeleteButton);
		});

		// Handle submission from bulk delete confirmation modal
		confirmBulkDeleteBtn.addEventListener('click', function() {
			bulkDeleteForm.submit();
		});
	});
	</script>

	<script>
		document.addEventListener('DOMContentLoaded', function() {
		    const addProductModal = document.getElementById('addProductModal');
		    const formContainer = document.getElementById('addProductForm');
		
		    addProductModal.addEventListener('show.bs.modal', function() {
		        fetch('/products/add') 
		            .then(response => response.text())
		            .then(html => {
		                formContainer.innerHTML = html;
		            })
		            .catch(error => {
		                formContainer.innerHTML = '<p class="text-danger">Failed to load form.</p>';
		                console.error(error);
		            });
		    });
		
		    addProductModal.addEventListener('hidden.bs.modal', function() {
		        formContainer.innerHTML = '';
		    });
		});
	</script>

	<script>
		document.addEventListener('DOMContentLoaded', function() {
		    const editProductModal = document.getElementById('editProductModal');
		    const formContainer = document.getElementById('editProductForm');
		
		    editProductModal.addEventListener('show.bs.modal', function(event) {
		        const button = event.relatedTarget;
		        const productId = button.getAttribute('data-id');
		
		        formContainer.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
		
		        fetch(`/products/edit/${productId}`) 
		            .then(response => {
		                if (!response.ok) throw new Error('Network response was not ok');
		                return response.text();
		            })
		            .then(html => {
		                formContainer.innerHTML = html;
		            })
		            .catch(error => {
		                formContainer.innerHTML = '<p class="text-danger text-center">Failed to load form.</p>';
		                console.error('Error fetching edit form:', error);
		            });
		    });
		
		    editProductModal.addEventListener('hidden.bs.modal', function() {
		        formContainer.innerHTML = '';
		    });
		});
	</script>

	<script>
		setTimeout(() => {
			const alert = document.querySelector('.alert');
			if (alert) {
				const bsAlert = new bootstrap.Alert(alert);
				bsAlert.close();
			}
		}, 3000);
	</script>

	<script>
	document.addEventListener('DOMContentLoaded', function() {
	  const deleteModal = document.getElementById('deleteModal');
	  const deleteForm = document.getElementById('deleteForm');
	  const deleteProductName = document.getElementById('deleteProductName');

	  deleteModal.addEventListener('show.bs.modal', function(event) {
	    const button = event.relatedTarget;
	    const productId = button.getAttribute('data-id');
	    const productName = button.getAttribute('data-name');

	    deleteProductName.textContent = productName;
	    deleteForm.action = '/products/delete/' + productId;
	  });
	});
	</script>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
		    var toastElList = [].slice.call(document.querySelectorAll('.toast'))
		    toastElList.map(function (toastEl) {
		        var toast = new bootstrap.Toast(toastEl)
		        toast.show()
		    })
		});
	</script>

	<script>
	document.addEventListener('DOMContentLoaded', function () {
	    const searchInput = document.getElementById('searchInput');
	    const categoryFilter = document.getElementById('categoryFilter');
	    const tableRows = document.querySelectorAll('tbody tr');

	    const seen = new Set();
	    categoryFilter.querySelectorAll('option').forEach(opt => {
	        if (opt.value === '') return;
	        if (seen.has(opt.value)) {
	            opt.remove();
	        } else {
	            seen.add(opt.value);
	        }
	    });

	    function filterRows() {
	        const query = searchInput.value.toLowerCase();
	        const selectedCategory = categoryFilter.value.toLowerCase();
	        let anyVisible = false;

	        tableRows.forEach(row => {
	            if (row.querySelector('td[colspan="10"]')) return; // Adjusted to 10 columns

	            // Adjusted children index because checkbox shifts the text cells over by 1 index
	            const productName = row.querySelector('td:nth-child(3)').textContent.toLowerCase(); 
	            const categoryName = row.querySelector('td:nth-child(6)').textContent.toLowerCase();

	            const matchesSearch = !query || productName.includes(query) || categoryName.includes(query);
	            const matchesCategory = !selectedCategory || categoryName === selectedCategory;

	            if (matchesSearch && matchesCategory) {
	                row.style.display = '';
	                anyVisible = true;
	            } else {
	                row.style.display = 'none';
	                // Uncheck hidden elements so they don't get accidentally deleted
	                const cb = row.querySelector('.row-checkbox');
	                if (cb) cb.checked = false;
	            }
	        });

	        const noDataRow = document.querySelector('td[colspan="10"]')?.closest('tr');
	        if (noDataRow) {
	            noDataRow.style.display = anyVisible ? 'none' : '';
	        }
	        
	        // Recalculate badge item count post-filtering
	        const event = new Event('change');
	        document.querySelector('.row-checkbox')?.dispatchEvent(event);
	    }

	    searchInput.addEventListener('input', filterRows);
	    categoryFilter.addEventListener('change', filterRows);
	});
	</script>
</body>
</html>
