<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>
<!-- Favicon / Logo -->
<link rel="icon" type="image/png" href="/images/kr.png">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
	rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
	background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	font-family: 'Inter', sans-serif;
	color: #334155;
	margin: 0;
}

.login-wrapper {
	display: flex;
	width: 950px;
	height: 580px;
	background-color: #ffffff;
	border-radius: 20px;
	overflow: hidden;
	box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

/* Left: Login form */
.login-form {
	width: 50%;
	padding: 50px;
	display: flex;
	flex-direction: column;
	justify-content: space-between; /* Ensures copyright stays perfectly balanced at bottom */
	background-color: #ffffff;
}

.login-form h2 {
	font-weight: 700;
	color: #1e293b;
	letter-spacing: -0.5px;
}

/* Right: Welcome image & text */
.login-image {
	width: 50%;
	background: linear-gradient(135deg, #1e293b, #0f172a);
	color: #ffffff;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	text-align: center;
	padding: 50px;
	position: relative;
}

.login-image img {
	width: 180px;
	margin-bottom: 25px;
	filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
	animation: float 4s ease-in-out infinite;
}

@keyframes float {
	0%, 100% { transform: translateY(0); }
	50% { transform: translateY(-10px); }
}

.login-image h2 {
	font-weight: 600;
	margin-bottom: 12px;
	letter-spacing: -0.5px;
}

.login-image p {
	font-size: 0.95rem;
	color: #94a3b8;
	max-width: 300px;
	line-height: 1.6;
}

/* Input & button styling */
.form-label {
	font-weight: 500;
	color: #64748b;
	font-size: 0.875rem;
}

.input-group-text {
	background-color: #f8fafc;
	border-color: #cbd5e1;
	color: #64748b;
	padding-left: 15px;
	padding-right: 15px;
}

.form-control, .form-select {
	border-radius: 8px;
	border-color: #cbd5e1;
	padding: 10px 14px;
	color: #1e293b;
	font-size: 0.95rem;
}

.form-control:focus, .form-select:focus {
	border-color: #6366f1;
	box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
}

.input-group:focus-within .input-group-text {
	border-color: #6366f1;
	color: #6366f1;
}

.btn-primary {
	background-color: #4f46e5;
	border: none;
	padding: 12px;
	font-weight: 500;
	border-radius: 8px;
	transition: all 0.2s ease;
}

.btn-primary:hover {
	background-color: #4338ca;
	transform: translateY(-1px);
	box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}

.btn-primary:active {
	transform: translateY(0);
}

/* Copyright Text Styling */
.copyright-text {
	font-size: 0.8rem;
	color: #94a3b8;
	text-align: center;
	margin-top: 25px;
}

/* Responsive */
@media (max-width: 992px) {
	.login-wrapper {
		width: 450px;
		height: auto;
		flex-direction: column;
		margin: 20px;
	}
	.login-form {
		width: 100%;
		padding: 40px 30px;
	}
	.login-image {
		display: none;
	}
}
</style>
</head>
<body>

	<div class="login-wrapper">

		<!-- Left: Login Form -->
		<div class="login-form">
			<div>
				<h2 class="mb-4">Sign In</h2>

				<!-- Error message -->
				<div th:if="${errorMessage}" class="alert alert-danger text-center py-2 fs-6">
					<span th:text="${errorMessage}"></span>
				</div>

				<form th:action="@{/login}" method="post">
					<!-- Username -->
					<div class="mb-3">
						<label for="username" class="form-label">Username</label>
						<div class="input-group">
							<span class="input-group-text"><i class="bi bi-person"></i></span>
							<input type="text" id="username" name="username"
								class="form-control" placeholder="Enter username" required>
						</div>
					</div>

					<!-- Password -->
					<div class="mb-3">
						<label for="password" class="form-label">Password</label>
						<div class="input-group">
							<span class="input-group-text"><i class="bi bi-lock"></i></span> 
							<input type="password" id="password" name="password"
								class="form-control" placeholder="Enter password" required>
						</div>
					</div>

					<!-- Role -->
					<div class="mb-4">
						<label for="role" class="form-label">Select Role</label>
						<div class="input-group">
							<span class="input-group-text"><i class="bi bi-person-badge"></i></span> 
							<select id="role" name="role" class="form-select" required>
								<option value="" disabled selected>Select your role</option>
								<option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
							</select>
						</div>
					</div>

					<!-- Submit -->
					<div class="d-grid">
						<button type="submit" class="btn btn-primary">
							Login <i class="bi bi-arrow-right ms-1"></i>
						</button>
					</div>
				</form>
			</div>

			<!-- Integrated Copyright Notice -->
			<div class="copyright-text">
				&copy; 2025 HeangPhalla. All rights reserved.
			</div>
		</div>

		<!-- Right: Image and Welcome Text -->
		<div class="login-image">
			<img src="https://cdn-icons-png.flaticon.com/512/4202/4202849.png" alt="Welcome">
			<h2>Welcome Back!</h2>
			<p>Access your dashboard and manage your work efficiently.</p>
		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
